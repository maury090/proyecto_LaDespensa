    <!--formulario creacion de nuevo usuario-->
    <br>
    <div class="container login-wrapper">
      <div class="login-card">

        <h2 class="login-title">Crear nuevo usuario</h2>

        <form action="/action_page.php">
          <div class="mb-3">
            <label for="fname" class="form-label">Ingresa tu nombre:</label>
            <input type="fname" class="form-control" id="fname" placeholder="John" name="fname">
          </div>
          <div class="mb-3">
            <label for="lname" class="form-label">Ingresa tu apellido:</label>
            <input type="lname" class="form-control" id="lname" placeholder="Doe" name="lname">
          </div>
          <div class="mb-3">
            <label for="rut" class="form-label">Ingresa tu rut sin puntos ni guion:</label>
            <input type="rut" class="form-control" id="rut" placeholder="123456789" name="rut">
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Ingresa tu correo de usuario:</label>
            <input type="email" class="form-control" id="email" placeholder="johnDoe@ejemplo.cl" name="email">
          </div>
          <div class="mb-3">
            <label for="pwd" class="form-label">Contraseña:</label>
            <input type="password" class="form-control" id="pwd" placeholder="Ingresa tu contraseña" name="pswd">
          </div><div class="mb-3">
            <label for="pwd" class="form-label">Confirmar contraseña:</label>
            <input type="password" class="form-control" id="pwd" placeholder="Confirma tu contraseña" name="pswd">
          </div>

          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" name="remember" id="remember">
            <label class="form-check-label" for="remember">Acepta los <a href="#" target="_blank">términos y condiciones</a></label>
          </div>

          <div class="d-grid justify-content-center" >
            <button type="submit" class="btn btn-ingresar shadow-sm">Ingresar</button>
          </div>
        </form>

        <div class="divider"></div>

        <div class="text-center">
          <p class="mb-2 text-muted small">¿No estás registrado?</p>
          <a href="{% url 'crearUsuario' %}" class="btn btn-registro btn-sm px-4">Crear cuenta</a>
        </div>

      </div>
    </div>
    <!--bootstrap-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermercado La Despensa</title>
    <!--bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--css-->
    <link rel="stylesheet" href="{% static 'css/design.css' %}">
</head>
<body>
    <!--barra de navegacion-->
    <nav class="navbar navbar-expand-lg mi-nav-personalizada">
      <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'index'%}"><img src="{% static 'imagenes/imagenes_propaganda/la_desp_logo.png' %}" alt="" id="logo"> 
          <span class="texto_marca">Supermercado La Despensa</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavDropdown">
          <ul class="navbar-nav ms-auto"> <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="{% url 'index' %}">Inicio</a>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                Productos
              </a>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#">Alimentacion</a></li>
                <li><a class="dropdown-item" href="#">Bebestibles</a></li>
                <li><a class="dropdown-item" href="#">Aseo</a></li>
              </ul>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'conocenos' %}">Conocenos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'login' %}">Iniciar sesion</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!--cuerpo de la pagina-->
    <!--carrusel-->
    <div id="demo" class="carousel slide" data-bs-ride="carousel">

      <!-- Indicators/dots -->
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
      </div>

      <!-- The slideshow/carousel -->
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="{% static 'imagenes/imagenes_propaganda/frontis_super.jpeg' %}" alt="Los Angeles" class="d-block" style="width:100%" id="imagen_carrusel">
        </div>
        <div class="carousel-item">
          <img src="{% static 'imagenes/imagenes_propaganda/marcas_asociadas.jpeg' %}" alt="Chicago" class="d-block" style="width:100%" id="imagen_carrusel">
        </div>
        <div class="carousel-item">
          <img src="{% static 'imagenes/imagenes_propaganda/pasillos.png' %}" alt="New York" class="d-block" style="width:100%" id="imagen_carrusel">
        </div>
      </div>

      <!-- Left and right controls/icons -->
      <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
